<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lash Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink:    #f72585;
    --violet:  #7209b7;
    --purple:  #560bad;
    --lilac:   #b5179e;
    --soft:    #ff48c4;
    --bg:      #0d0010;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── ambient glow orbs ── */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: .25;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 340px; height: 340px;
    background: var(--pink);
    top: -80px; left: -80px;
  }
  body::after {
    width: 300px; height: 300px;
    background: var(--violet);
    bottom: -60px; right: -60px;
  }

  /* ── header ── */
  .header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 44px 20px 20px;
  }
  .header-eyebrow {
    display: inline-block;
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--soft);
    margin-bottom: 10px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.15;
    letter-spacing: -.01em;
  }
  .header h1 em {
    font-style: italic;
    font-weight: 400;
    background: linear-gradient(90deg, var(--pink), var(--soft), #c77dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: rgba(255,255,255,.38);
    font-size: .78rem;
    margin-top: 8px;
    letter-spacing: .03em;
  }

  /* ── grid ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding: 18px 16px 30px;
    max-width: 480px;
    margin: 0 auto;
    position: relative; z-index: 1;
  }

  /* ── card ── */
  .card {
    border-radius: 24px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    aspect-ratio: 3/4;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    transition: transform .18s ease, box-shadow .18s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .card:active { transform: scale(.95); }

  .card-lifting {
    background: linear-gradient(145deg, #3a0ca3 0%, #7209b7 40%, #b5179e 75%, #f72585 100%);
    box-shadow: 0 8px 32px rgba(247, 37, 133, .35);
  }
  .card-pestanas {
    background: linear-gradient(145deg, #f72585 0%, #c77dff 50%, #7209b7 100%);
    box-shadow: 0 8px 32px rgba(199, 125, 255, .35);
  }

  .card-shimmer {
    position: absolute; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,.18) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(255,255,255,.10) 0%, transparent 50%);
  }

  .card-icon {
    position: absolute; top: 18px; left: 0; right: 0;
    z-index: 2;
    display: flex; justify-content: center;
  }
  .card-icon span {
    font-size: 2.4rem;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,.3));
  }

  .card-foot {
    position: relative; z-index: 3;
    padding: 14px 12px;
    background: linear-gradient(to top, rgba(0,0,0,.65) 0%, transparent 100%);
    text-align: center;
  }
  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    text-shadow: 0 2px 10px rgba(0,0,0,.5);
  }
  .card-cta {
    display: inline-block;
    margin-top: 7px;
    font-size: .6rem;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(255,255,255,.9);
    background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.3);
    border-radius: 99px;
    padding: 3px 10px;
    backdrop-filter: blur(4px);
  }

  /* ── WHATSAPP BUTTON ── */
  .whatsapp-section {
    position: relative; z-index: 1;
    display: flex;
    justify-content: center;
    padding: 0 16px 40px;
  }
  .whatsapp-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
    color: #fff;
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    font-size: .92rem;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 99px;
    box-shadow: 0 6px 24px rgba(37, 211, 102, .35);
    transition: transform .18s ease, box-shadow .18s ease;
    letter-spacing: .02em;
    -webkit-tap-highlight-color: transparent;
  }
  .whatsapp-btn:active {
    transform: scale(.96);
    box-shadow: 0 3px 12px rgba(37, 211, 102, .25);
  }
  .whatsapp-btn svg {
    width: 22px; height: 22px;
    flex-shrink: 0;
  }

  /* ── MODAL ── */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 100;
    flex-direction: column;
  }
  .modal-backdrop.open { display: flex; }

  .modal-topbar {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px;
    flex-shrink: 0;
    background: rgba(13,0,16,.9);
    border-bottom: 1px solid rgba(247,37,133,.2);
    backdrop-filter: blur(10px);
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: #fff;
  }
  .modal-close {
    background: rgba(247,37,133,.2);
    border: 1px solid rgba(247,37,133,.4);
    color: #fff;
    font-size: 1.1rem;
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .modal-close:hover { background: rgba(247,37,133,.4); }

  .modal-content {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
  }

  .img-gallery {
    display: flex; flex-direction: column; gap: 12px;
  }
  .img-gallery img {
    width: 100%;
    border-radius: 16px;
    display: block;
    box-shadow: 0 4px 24px rgba(247,37,133,.2);
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .img-gallery img:active { transform: scale(.98); }

  /* ── FULLSCREEN ── */
  .img-fullscreen {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.97);
    z-index: 200;
    align-items: center; justify-content: center;
  }
  .img-fullscreen.open { display: flex; }
  .img-fullscreen img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .fs-close {
    position: absolute; top: 16px; right: 16px;
    background: rgba(247,37,133,.25);
    border: 1px solid rgba(247,37,133,.5);
    color: #fff; font-size: 1.3rem;
    width: 42px; height: 42px; border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── spinner ── */
  .spinner {
    width: 38px; height: 38px;
    border: 3px solid rgba(247,37,133,.2);
    border-top-color: var(--pink);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 70px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg { color: #f99; text-align: center; padding: 40px 20px; font-size: .88rem; line-height: 1.7; }

  .placeholder-msg {
    text-align: center;
    color: rgba(255,255,255,.4);
    font-size: .85rem;
    line-height: 1.8;
    padding: 50px 24px;
  }
  .placeholder-msg strong { color: var(--soft); display: block; font-size: 1.1rem; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="header">
  <span class="header-eyebrow">✦ Studio de belleza ✦</span>
  <h1>Tu mirada,<br><em>tu arte</em></h1>
  <p>Elegí el servicio que querés ver</p>
</div>

<div class="grid">

  <div class="card card-lifting" onclick="openModal('lifting')">
    <div class="card-shimmer"></div>
    <div class="card-icon"><span>✨</span></div>
    <div class="card-foot">
      <div class="card-name">Lifting &amp; Laminado</div>
      <span class="card-cta">Ver trabajos →</span>
    </div>
  </div>

  <div class="card card-pestanas" onclick="openModal('pestanas')">
    <div class="card-shimmer"></div>
    <div class="card-icon"><span>👁️</span></div>
    <div class="card-foot">
      <div class="card-name">Pestañas pelo por pelo</div>
      <span class="card-cta">Ver trabajos →</span>
    </div>
  </div>

</div>

<!-- WhatsApp Button -->
<div class="whatsapp-section">
  <a class="whatsapp-btn" href="https://wa.me/5491176202316" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    Escribinos por WhatsApp
  </a>
</div>

<!-- Fullscreen -->
<div class="img-fullscreen" id="fullscreen">
  <button class="fs-close" onclick="closeFullscreen()">✕</button>
  <img id="fullscreenImg" src="" alt="">
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal-topbar">
    <span class="modal-title" id="modalTitle"></span>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
const BASE = 'https://raw.githubusercontent.com/ucciflorencia9-gif/Flopy.lash/main/';

const SERVICIOS = {
  lifting: {
    nombre: "Lifting & Laminado",
    imagenes: [
      BASE + 'IMG_7930.jpeg',
      BASE + 'IMG_7931.jpeg',
      BASE + 'IMG_7932.jpeg',
      BASE + 'IMG_7933.jpeg',
    ]
  },
  pestanas: {
    nombre: "Pestañas pelo por pelo",
    imagenes: [
      BASE + 'IMG_7901.jpeg',
      BASE + 'IMG_7909.jpeg',
      BASE + 'IMG_7910.jpeg',
      BASE + 'IMG_7913.jpeg',
      BASE + 'IMG_7915.jpeg',
      BASE + 'IMG_7916.jpeg',
    ]
  }
};

function openModal(key) {
  const servicio = SERVICIOS[key];
  document.getElementById('modalTitle').textContent = servicio.nombre;
  const content = document.getElementById('modalContent');
  content.innerHTML = '<div class="spinner"></div>';
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  setTimeout(() => {
    if (!servicio.imagenes.length) {
      content.innerHTML = `
        <div class="placeholder-msg">
          <strong>¡Fotos próximamente!</strong>
          Para agregar tus imágenes, editá el archivo<br>
          y completá las URLs en la sección<br><em>CONFIGURACIÓN</em> del código.
        </div>`;
      return;
    }

    const imgs = servicio.imagenes.map(src =>
      `<img src="${src}" alt="${servicio.nombre}" loading="lazy"
        onclick="openFullscreen('${src}')"
        onerror="this.style.display='none'">`
    ).join('');

    content.innerHTML = `<div class="img-gallery">${imgs}</div>`;
  }, 380);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalContent').innerHTML = '';
  document.body.style.overflow = '';
}

function openFullscreen(src) {
  document.getElementById('fullscreenImg').src = src;
  document.getElementById('fullscreen').classList.add('open');
}

function closeFullscreen() {
  document.getElementById('fullscreen').classList.remove('open');
  document.getElementById('fullscreenImg').src = '';
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.getElementById('fullscreen').addEventListener('click', e => {
  if (e.target === document.getElementById('fullscreen')) closeFullscreen();
});
</script>
</body>
</html>
